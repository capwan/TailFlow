  />

  <!-- Dots at peaks -->
  <circle cx="77"  cy="278" r="14" fill="#22d3ee"/>
  <circle cx="165" cy="136" r="14" fill="#22d3ee"/>
  <circle cx="253" cy="186" r="14" fill="#22d3ee"/>
  <circle cx="341" cy="236" r="14" fill="#22d3ee"/>
  <circle cx="429" cy="296" r="14" fill="#22d3ee"/>
